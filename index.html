<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Collection Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h1>User Information</h1>
        <p class="subtitle">Enter your details below</p>
      </div>

      <div>
        <div class="form-group">
          <label for="input1">Full Name</label>
          <input
            type="text"
            id="input1"
            placeholder="Enter your full name"
            required
          />
        </div>

        <div class="form-group">
          <label for="input2">Email Address</label>
          <input
            type="email"
            id="input2"
            placeholder="Enter your email"
            required
          />
        </div>

        <div class="form-group">
          <label for="input3">Phone Number</label>
          <input
            type="tel"
            id="input3"
            placeholder="Enter your phone number"
            required
          />
        </div>

        <div class="button-group">
          <button type="button" class="save-btn" id="saveBtn">Save Data</button>
          <button type="button" class="clear-btn" id="clearBtn">Clear</button>
        </div>
      </div>

      <div class="display-section">
        <div class="display-title">Saved Information</div>
        <div class="display-area" id="displayArea">
          <p class="empty-state">
            No data saved yet. Fill the form and click "Save Data" to see your
            information here.
          </p>
        </div>
      </div>
    </div>

    <!-- Modal -->
    <div
      class="modal fade"
      id="exampleModal"
      tabindex="-1"
      aria-labelledby="exampleModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="exampleModalLabel">
              Edit Information
            </h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <div class="form-group">
              <label for="input1">Edit Full Name</label>
              <input
                type="text"
                id="editInput1"
                placeholder="Enter your full name"
                required
              />
            </div>

            <div class="form-group">
              <label for="input2">Edit Email Address</label>
              <input
                type="email"
                id="editInput2"
                placeholder="Enter your email"
                required
              />
            </div>

            <div class="form-group">
              <label for="input3">Edit Phone Number</label>
              <input
                type="tel"
                id="editInput3"
                placeholder="Enter your phone number"
                required
              />
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Close
            </button>
            <button
              type="button"
              class="btn btn-primary"
              data-bs-dismiss="modal"
              editBtn
              onclick="editBtn()"
            >
              Save changes
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const arrayList = [];
      let editIndex;

      saveBtn.addEventListener("click", () => {
        const saveBtn = document.getElementById("saveBtn");
        const clearButton = document.getElementById("clearBtn");
        const displayArea = document.getElementById("displayArea");
        const fullName = document.getElementById("input1").value;
        const email = document.getElementById("input2").value;
        const number = document.getElementById("input3").value;
        if (
          fullName.trim() === "" ||
          email.trim() === "" ||
          number.trim() === ""
        ) {
          alert("All inputs must be filled");
        } else {
          const userObj = { fullName, email, number };
          arrayList.push(userObj);
          console.log(userObj);
          displayFunction();
        }
      });

      clearBtn.addEventListener("click", () => {
        arrayList.splice(0, arrayList.length);
        displayArea.innerHTML =
          '<p class="empty-state">No data saved yet. Fill the form and click "Save Data" to see your information here.</p>';
        
      });

      const clickDelete = (del) => {
        const confirmation = confirm("Are you sure you want to delete?");
        if (confirmation) {
          arrayList.splice(del, 1);

          if (arrayList.length < 1) {
            displayArea.innerHTML =
              '<p class="empty-state">No data saved yet. Fill the form and click "Save Data" to see your information here.</p>';
          } else {
            displayFunction();
          }
        } else {
          displayFunction();
        }
      };

      const clickEdit = (i) => {
        editIndex = i;
        editInput1.value = arrayList[i].fullName;
        editInput2.value = arrayList[i].email;
        editInput3.value = arrayList[i].number;
      };

      const editBtn = (i) => {
        const editFullName = document.getElementById("editInput1").value;
        const editEmail = document.getElementById("editInput2").value;
        const editNumber = document.getElementById("editInput3").value;
        if (
          editFullName.trim() === "" ||
          editEmail.trim() === "" ||
          editNumber.trim() === ""
        ) {
          alert("All inputs must be filled");
        } else {
          arrayList[editIndex] = {
            fullName: editFullName,
            email: editEmail,
            number: editNumber,
          };
          displayFunction();
        }
      };

      function displayFunction() {
        displayArea.innerHTML = "";
        for (let index = 0; index < arrayList.length; index++) {
          const currentUser = arrayList[index];

          displayArea.innerHTML += `<div class="data-label">${index + 1}. Name:
                <span class="data-value">${escapeHtml(currentUser.fullName)}.  </span> Email:<span class="data-value">${escapeHtml(currentUser.email)}</span>  Number: <span class="data-value">${escapeHtml(currentUser.number)}
                    <p style="margin:5px 0px"><button type="button" class="save-btn" onclick="clickDelete(${index})">Delete</button>&nbsp&nbsp&nbsp<button data-bs-toggle="modal" data-bs-target="#exampleModal" type="button" onclick="clickEdit(${index})" class="save-btn">Edit</button> 
                        </p>
                </div>`;
        }
        document.getElementById("input1").value = "";
        document.getElementById("input2").value = "";
        document.getElementById("input3").value = "";
      }

      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }
    </script>
  </body>
</html>
